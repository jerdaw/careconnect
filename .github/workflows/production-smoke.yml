name: Production Smoke

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: careconnect-production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify public health endpoint
        run: |
          # Cloudflare blocks Python's default urllib user agent on this route.
          # Use curl for the probe and Python only for JSON validation.
          curl -fsS -A 'CareConnectProductionSmoke/1.0' https://careconnect.ing/api/v1/health | python3 -c '
          import json
          import sys

          payload = json.load(sys.stdin)
          assert payload.get("status") in {"healthy", "degraded"}, payload
          print(payload)
          '

      - name: Verify apex response
        run: |
          curl -sSI https://careconnect.ing > apex.headers
          grep -Eq '^HTTP/.* (200|307)' apex.headers

      - name: Verify www redirect
        run: |
          curl -sSI https://www.careconnect.ing | tr -d '\r' > www.headers
          grep -Eq '^HTTP/.* 308' www.headers
          grep -Eqi '^location: https://careconnect\.ing/?$' www.headers

      - name: Verify robots and sitemap host
        run: |
          curl -fsS https://careconnect.ing/robots.txt > robots.txt
          grep -Fx 'Sitemap: https://careconnect.ing/sitemap.xml' robots.txt
          curl -fsS https://careconnect.ing/sitemap.xml > sitemap.xml
          grep -F '<loc>https://careconnect.ing/' sitemap.xml

      - name: Verify runtime security headers
        run: npm run validate:security-headers:runtime
        env:
          SECURITY_HEADERS_BASE_URL: https://careconnect.ing
