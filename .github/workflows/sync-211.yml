name: Sync 211 Ontario Data

on:
  workflow_dispatch:
    inputs:
      confirm_live_sync:
        description: "Confirm this manual run is allowed to modify data/services.json using real 211 data."
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - name: Confirm manual sync approval
        run: |
          if [ "${{ github.event.inputs.confirm_live_sync }}" != "true" ]; then
            echo "::error::Manual confirmation is required to run the 211 sync."
            exit 1
          fi

      - run: npx tsx scripts/sync-211.ts
        env:
          ALLOW_211_SYNC: "1"
          API_211_KEY: ${{ secrets.API_211_KEY }}

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(data): sync 211 Ontario services"
          file_pattern: "data/services.json"
          commit_user_name: Jeremy Dawson
          commit_user_email: 55965641+jerdaw@users.noreply.github.com
          commit_author: Jeremy Dawson <55965641+jerdaw@users.noreply.github.com>
