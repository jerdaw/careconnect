---
site_name: HelpBridge
site_url: https://github.com/jerdaw/helpbridge
site_description: Documentation for the HelpBridge project.
repo_name: jerdaw/helpbridge
repo_url: https://github.com/jerdaw/helpbridge
strict: false

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: timeago
  - social:
      cards_layout_options:
        background_color: "#000000"
        font_family: Roboto
  - swagger-ui-tag

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - def_list
  - footnotes
  - tables

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api/README.md
  - Guidelines:
      - Documentation: documentation-guidelines.md
      - Testing: testing-guidelines.md
      - Bilingual: bilingual-dev-guide.md
  - Components: components.md
  - API: api/
  - Deployment: deployment/
  - Development: development/
  - Implementation: implementation/
  - Governance: governance/
  - Legal: legal/
  - Roadmaps: roadmaps/
  - Security: security/
  - Whitepapers: whitepapers/
